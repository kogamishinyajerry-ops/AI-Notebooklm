<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>COMAC NotebookLM — Admin Dashboard</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         margin: 0; background: #f4f5f7; color: #1f2328; }
  header { background: #0969da; color: #fff; padding: 12px 20px;
           display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; }
  main { padding: 20px; max-width: 1200px; margin: 0 auto; }
  section { background: #fff; border: 1px solid #d0d7de; border-radius: 6px;
            margin-bottom: 16px; padding: 16px; }
  h2 { font-size: 14px; margin: 0 0 12px; color: #57606a; text-transform: uppercase; letter-spacing: 0.04em; }
  .bar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
  input, select, button { font-size: 13px; padding: 6px 10px; border: 1px solid #d0d7de; border-radius: 4px; background: #fff; }
  button { cursor: pointer; background: #f6f8fa; }
  button:hover { background: #eaeef2; }
  button.primary { background: #1f883d; color: #fff; border-color: #1a7f37; }
  button.primary:hover { background: #1a7f37; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid #eaeef2; }
  th { background: #f6f8fa; color: #57606a; font-weight: 600; }
  tr:hover td { background: #f6f8fa; }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 10px;
          font-size: 11px; font-weight: 600; }
  .pill.ok { background: #dafbe1; color: #1a7f37; }
  .pill.fail { background: #ffebe9; color: #cf222e; }
  .muted { color: #6e7781; font-size: 11px; }
  .error { color: #cf222e; padding: 8px 10px; background: #ffebe9; border-radius: 4px; font-size: 12px; }
  code { font-family: ui-monospace, SFMono-Regular, monospace; font-size: 11px; background: #f6f8fa; padding: 1px 4px; border-radius: 3px; }
</style>
</head>
<body>
<header>
  <h1>COMAC NotebookLM — Admin Dashboard</h1>
  <div class="bar" style="margin: 0;">
    <input id="api-key" type="password" placeholder="x-api-key" style="width: 220px;">
    <button id="save-key">Save</button>
    <button id="refresh-all" class="primary">Refresh</button>
  </div>
</header>
<main>
  <div id="error-banner"></div>
  <section>
    <h2>Health</h2>
    <div id="health">—</div>
  </section>
  <section>
    <h2>Quota usage (per principal)</h2>
    <table id="quota-table">
      <thead><tr>
        <th>principal</th><th>date</th><th>bytes used</th><th>daily limit</th>
        <th>notebooks</th><th>max</th>
      </tr></thead>
      <tbody><tr><td colspan="6" class="muted">Click Refresh to load.</td></tr></tbody>
    </table>
  </section>
  <section>
    <h2>Audit events</h2>
    <div class="bar">
      <input id="filter-event" placeholder="event (e.g. source.upload)" style="width: 220px;">
      <input id="filter-principal" placeholder="principal_id" style="width: 160px;">
      <select id="filter-outcome">
        <option value="">outcome (any)</option>
        <option value="success">success</option>
        <option value="failure">failure</option>
      </select>
      <button id="audit-reload">Apply</button>
      <button id="audit-next" disabled>Next page</button>
    </div>
    <table id="audit-table">
      <thead><tr>
        <th>ts_utc</th><th>event</th><th>outcome</th><th>principal</th>
        <th>resource</th><th>status</th>
      </tr></thead>
      <tbody><tr><td colspan="6" class="muted">Click Refresh to load.</td></tr></tbody>
    </table>
  </section>
</main>
<script>
const STORAGE_KEY = "comac_admin_api_key";
let currentCursor = null;

function getKey() { return document.getElementById("api-key").value.trim(); }

function saveKey() {
  const k = getKey();
  if (k) { localStorage.setItem(STORAGE_KEY, k); showError(""); }
}

function restoreKey() {
  const stored = localStorage.getItem(STORAGE_KEY);
  if (stored) document.getElementById("api-key").value = stored;
}

function showError(msg) {
  const el = document.getElementById("error-banner");
  el.innerHTML = msg ? '<div class="error">' + msg + '</div>' : '';
}

async function call(path) {
  const key = getKey();
  if (!key) throw new Error("Set x-api-key first.");
  const r = await fetch(path, { headers: { "x-api-key": key } });
  if (!r.ok) {
    const body = await r.text();
    throw new Error("HTTP " + r.status + " " + r.statusText + " — " + body.slice(0, 200));
  }
  return r.json();
}

function escapeHtml(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g,
    c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function fmtBytes(n) {
  if (n < 1024) return n + " B";
  if (n < 1024 * 1024) return (n / 1024).toFixed(1) + " KB";
  if (n < 1024 * 1024 * 1024) return (n / 1024 / 1024).toFixed(1) + " MB";
  return (n / 1024 / 1024 / 1024).toFixed(2) + " GB";
}

async function loadHealth() {
  try {
    const d = await call("/api/v1/admin/health");
    document.getElementById("health").innerHTML =
      '<span class="pill ok">' + escapeHtml(d.status) + '</span> ' +
      '<span class="muted">uptime ' + d.uptime_sec + 's · admins ' + d.admin_count +
      ' · auth_enabled=' + d.auth_enabled + ' · caller <code>' + escapeHtml(d.caller.principal_id) +
      '</code></span>';
  } catch (e) { showError(e.message); }
}

async function loadQuota() {
  try {
    const d = await call("/api/v1/admin/quota/usage");
    const tb = document.querySelector("#quota-table tbody");
    if (!d.rows.length) { tb.innerHTML = '<tr><td colspan="6" class="muted">no data</td></tr>'; return; }
    tb.innerHTML = d.rows.map(r =>
      '<tr><td><code>' + escapeHtml(r.principal_id) + '</code></td>' +
      '<td>' + escapeHtml(r.usage_date || "—") + '</td>' +
      '<td>' + fmtBytes(r.bytes_used) + '</td>' +
      '<td>' + fmtBytes(r.daily_limit) + '</td>' +
      '<td>' + r.notebook_count + '</td>' +
      '<td>' + r.notebook_max + '</td></tr>').join("");
  } catch (e) { showError(e.message); }
}

async function loadAudit(useCursor) {
  try {
    const params = new URLSearchParams();
    const ev = document.getElementById("filter-event").value.trim();
    const pid = document.getElementById("filter-principal").value.trim();
    const oc = document.getElementById("filter-outcome").value;
    if (ev) params.set("event", ev);
    if (pid) params.set("principal_id", pid);
    if (oc) params.set("outcome", oc);
    if (useCursor && currentCursor) params.set("cursor", currentCursor);
    params.set("limit", "50");
    const d = await call("/api/v1/admin/audit/events?" + params.toString());
    const tb = document.querySelector("#audit-table tbody");
    if (!d.items.length) { tb.innerHTML = '<tr><td colspan="6" class="muted">no events</td></tr>'; }
    else {
      tb.innerHTML = d.items.map(r =>
        '<tr><td><code>' + escapeHtml(r.ts_utc) + '</code></td>' +
        '<td>' + escapeHtml(r.event) + '</td>' +
        '<td><span class="pill ' + (r.outcome === "success" ? "ok" : "fail") + '">' +
        escapeHtml(r.outcome) + '</span></td>' +
        '<td><code>' + escapeHtml(r.principal_id) + '</code></td>' +
        '<td><code>' + escapeHtml(r.resource_type) + ':' + escapeHtml(r.resource_id) + '</code></td>' +
        '<td>' + r.http_status + '</td></tr>').join("");
    }
    currentCursor = d.next_cursor;
    document.getElementById("audit-next").disabled = !currentCursor;
  } catch (e) { showError(e.message); }
}

document.getElementById("save-key").onclick = saveKey;
document.getElementById("refresh-all").onclick = () => { showError(""); loadHealth(); loadQuota(); currentCursor = null; loadAudit(false); };
document.getElementById("audit-reload").onclick = () => { currentCursor = null; loadAudit(false); };
document.getElementById("audit-next").onclick = () => loadAudit(true);

restoreKey();
</script>
</body>
</html>
