version: '3.8'

services:
  notebooklm-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: comac_notebooklm_api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    environment:
      - ENVIRONMENT=production
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      - EMBEDDING_LOCAL_FILES_ONLY=1
      - RERANKER_LOCAL_FILES_ONLY=1
      - HF_HOME=/opt/hf-cache
      - SENTENCE_TRANSFORMERS_HOME=/opt/hf-cache
      - EMBEDDING_MODEL_NAME=BAAI/bge-large-zh-v1.5
      - RERANKER_MODEL_NAME=BAAI/bge-reranker-base
      # Placeholder: point this to the actual local vLLM service port.
      - VLLM_URL=http://host.docker.internal:8001/v1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
