# V4.1-T1 Retrieval Quality CI Baseline — Golden Query Set
# FAA Part 25 (20 queries) + CCAR-25 (10 queries)
# Corresponds to notebook_id: nb-faa-baseline (FAA) / nb-ccar-baseline (CCAR)
# Source: FAA_Part25.pdf (local corpus at data/docs/FAA_Part25.pdf)
#
# Fields:
#   id:             unique query identifier
#   question:       natural-language query (Chinese or English)
#   expected_pages: PDF page numbers that contain the answer (from manual annotation)
#   keywords:       additional keyword hints for hit validation
#   notebook_id:   which eval notebook this query belongs to
#   corpus:        which PDF/doc this query targets
#   note:          optional context

faa_queries:
  - id: q-faa-001
    question: "失速演示和失速警告有哪些要求？"
    expected_pages: [1]
    keywords: ["stall demonstration", "stall warning", "stall speed"]
    notebook_id: nb-faa-baseline
    corpus: FAA_Part25.pdf
    note: "TOC chunk covering Part 25 stalls section (§§25.201–25.207)"

  - id: q-faa-002
    question: "结构疲劳评估和 LOV 需要满足什么要求？"
